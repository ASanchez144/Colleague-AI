# ============================================================
#  Tu Socia! — Override systemd para ollama.service
#  Ruta destino: /etc/systemd/system/ollama.service.d/override.conf
#  Aplicación:   sudo systemctl daemon-reload && sudo systemctl restart ollama
# ============================================================
#
# Ollama ya registra su propia unidad systemd en /etc/systemd/system/ollama.service
# al instalarse (ver https://ollama.com/download/linux). En lugar de reescribirla,
# aplicamos un "drop-in" override con los ajustes que Claude Code necesita:
#
#   - OLLAMA_HOST           → escucha en loopback puerto 11434 (default)
#   - OLLAMA_KEEP_ALIVE     → mantiene el modelo cargado 24h para evitar cold-starts
#   - OLLAMA_NUM_CTX        → 64k tokens de contexto (mínimo recomendado por Claude Code)
#   - OLLAMA_MAX_LOADED_MODELS → 2 modelos calientes en RAM a la vez
#   - Restart=always        → si muere por OOM u otra razón, vuelve solo
#   - RestartSec=5          → esperar 5s antes de relanzar (evita bucle rápido)
#
# Para exponer Ollama a otras máquinas de la LAN (no recomendado sin firewall),
# cambia OLLAMA_HOST a "0.0.0.0:11434".
#
[Service]
Environment="OLLAMA_HOST=127.0.0.1:11434"
Environment="OLLAMA_KEEP_ALIVE=24h"
Environment="OLLAMA_NUM_CTX=65536"
Environment="OLLAMA_MAX_LOADED_MODELS=2"
Environment="OLLAMA_FLASH_ATTENTION=1"
Environment="HOME=/root"
Restart=always
RestartSec=5
# Reabre el servicio aunque el binario aún no esté listo tras el boot
TimeoutStartSec=60
