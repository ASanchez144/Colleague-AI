<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
<!-- Decorative subtle background elements -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary-fixed-dim/20 blur-[100px]"></div>
<div class="absolute top-[60%] -right-[10%] w-[40%] h-[40%] rounded-full bg-secondary-fixed-dim/20 blur-[100px]"></div>
</div>
<!-- Main Registration Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl border border-outline-variant shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 relative z-10">
<!-- Brand Header -->
<div class="text-center mb-8">
<h1 class="font-h2 text-h2 text-on-surface mb-2">Sebas.ai</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Create your account to get started.</p>
</div>
<form class="space-y-5">
<!-- Full Name Field -->
<div class="flex flex-col gap-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="fullName">Full Name</label>
<input class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="fullName" name="fullName" placeholder="Jane Doe" type="text"/>
</div>
<!-- Business Name Field -->
<div class="flex flex-col gap-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="businessName">Business Name</label>
<input class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="businessName" name="businessName" placeholder="Acme Corp" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="email">Email</label>
<input class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="jane@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant" for="password">Password</label>
<input class="w-full px-3 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<!-- Submit Button -->
<button class="w-full mt-2 bg-primary text-on-primary py-3 rounded-lg font-label-md text-label-md hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-[inset_0_1px_0_rgba(255,255,255,0.2)]" type="button">
                Create Account
            </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-6">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-outline">OR</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Google Sign Up -->
<button class="w-full flex items-center justify-center gap-2 bg-surface-container-lowest border border-outline-variant text-on-surface py-2.5 rounded-lg font-label-md text-label-md hover:bg-surface-container-low transition-colors" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25C22.56 11.47 22.49 10.73 22.36 10.02H12V14.24H17.92C17.67 15.6 16.92 16.75 15.77 17.52V20.25H19.33C21.41 18.33 22.56 15.54 22.56 12.25Z" fill="#4285F4"></path>
<path d="M12 23C14.97 23 17.46 22.02 19.33 20.25L15.77 17.52C14.76 18.2 13.48 18.6 12 18.6C9.13 18.6 6.71 16.66 5.84 14.07H2.18V16.91C3.99 20.5 7.7 23 12 23Z" fill="#34A853"></path>
<path d="M5.84 14.07C5.62 13.41 5.49 12.72 5.49 12C5.49 11.28 5.61 10.59 5.84 9.93V7.09H2.18C1.43 8.58 1 10.24 1 12C1 13.76 1.43 15.42 2.18 16.91L5.84 14.07Z" fill="#FBBC05"></path>
<path d="M12 5.4C13.62 5.4 15.06 5.96 16.21 7.05L19.41 3.85C17.45 2.02 14.97 1 12 1C7.7 1 3.99 3.5 2.18 7.09L5.84 9.93C6.71 7.34 9.13 5.4 12 5.4Z" fill="#EA4335"></path>
</svg>
            Sign up with Google
        </button>
<!-- Links & Terms -->
<div class="mt-8 text-center space-y-4">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? <a class="text-primary font-medium hover:underline" href="#">Log in</a>
</p>
<p class="font-body-sm text-[11px] leading-tight text-outline px-4">
                By creating an account, you agree to our <a class="underline hover:text-on-surface-variant" href="#">Terms of Service</a> and <a class="underline hover:text-on-surface-variant" href="#">Privacy Policy</a>.
            </p>
